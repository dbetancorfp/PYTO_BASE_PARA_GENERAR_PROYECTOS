site_name: PYTO RAG Base Genera Proyectos
site_description: Generic RAG-driven agent pipeline for generating web applications view by view
repo_url: https://github.com/dbetancorfp/PYTO_RAG_BASE_GENERA_PROYECTOS
repo_name: dbetancorfp/PYTO_RAG_BASE_GENERA_PROYECTOS

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Pipeline: pipeline.md
  - Architecture: architecture.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

strict: true
